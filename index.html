<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Smart Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --font-display: 'Fraunces', serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    --bg: #E7E2D3;
    --surface: #F6F3E8;
    --surface-alt: #EFEBDC;
    --ink: #2A2622;
    --ink-muted: #756F62;
    --rule: #CFC8B3;
    --accent: #1F4E5F;
    --accent-soft: rgba(31, 78, 95, 0.10);
    --accent-done: #707B4F;
    --done-soft: rgba(112, 123, 79, 0.12);
    --high: #9C3B2A;
    --high-soft: rgba(156, 59, 42, 0.12);
    --medium: #B9842A;
    --medium-soft: rgba(185, 132, 42, 0.14);
    --low: #4F6B5C;
    --low-soft: rgba(79, 107, 92, 0.12);
    --shadow: 0 1px 2px rgba(42, 38, 34, 0.06), 0 6px 18px rgba(42, 38, 34, 0.06);
  }

  [data-theme="dark"] {
    --bg: #15171B;
    --surface: #1D2024;
    --surface-alt: #23262B;
    --ink: #E7E2D3;
    --ink-muted: #93948C;
    --rule: #34373C;
    --accent: #6FB3D1;
    --accent-soft: rgba(111, 179, 209, 0.12);
    --accent-done: #A8B488;
    --done-soft: rgba(168, 180, 136, 0.12);
    --high: #D97A63;
    --high-soft: rgba(217, 122, 99, 0.14);
    --medium: #E0AE5C;
    --medium-soft: rgba(224, 174, 92, 0.14);
    --low: #8FAE9B;
    --low-soft: rgba(143, 174, 155, 0.14);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    transition: background 0.3s ease, color 0.3s ease;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
  }

  .brand h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 2.1rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .brand p {
    margin: 0;
    color: var(--ink-muted);
    font-size: 0.92rem;
  }

  .theme-toggle {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: transform 0.25s ease, background 0.3s ease, border-color 0.3s ease;
  }
  .theme-toggle:hover { transform: rotate(18deg); }
  .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid var(--rule);
    border-radius: 10px;
    background: var(--surface);
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .stat {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--rule);
  }
  .stat:last-child { border-right: none; }
  .stat .num {
    font-family: var(--font-mono);
    font-size: 1.7rem;
    font-weight: 600;
    line-height: 1;
    display: block;
  }
  .stat .label {
    margin-top: 6px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .stat.pending .num { color: var(--accent); }
  .stat.done .num { color: var(--accent-done); }

  /* ---------- search + form ---------- */
  .controls {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 28px;
  }

  .search-row { margin-bottom: 12px; }

  input[type="text"], input[type="date"], select {
    font-family: var(--font-body);
    font-size: 0.92rem;
    color: var(--ink);
    background: var(--surface-alt);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 10px 12px;
    width: 100%;
    transition: border-color 0.2s ease, background 0.3s ease, color 0.3s ease;
  }
  input::placeholder { color: var(--ink-muted); }
  input:focus-visible, select:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .add-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
  }
  .add-row select, .add-row input[type="date"] { width: auto; }

  @media (max-width: 560px) {
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row .task-text { grid-column: 1 / -1; }
  }

  button.add-btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.88rem;
    background: var(--accent);
    color: var(--surface);
    border: none;
    border-radius: 7px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s ease, transform 0.15s ease;
  }
  button.add-btn:hover { opacity: 0.88; }
  button.add-btn:active { transform: scale(0.97); }
  button.add-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- sections ---------- */
  .section-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin: 0 0 12px;
    font-family: var(--font-mono);
    font-size: 0.74rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  section { margin-bottom: 30px; }

  .task-list { list-style: none; margin: 0; padding: 0; }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px dashed var(--rule);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .task:last-child { border-bottom: none; }

  .check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .check:hover { border-color: var(--accent); }
  .check svg { width: 11px; height: 11px; opacity: 0; transition: opacity 0.15s ease; }

  .task.is-done .check {
    background: var(--accent-done);
    border-color: var(--accent-done);
  }
  .task.is-done .check svg { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 0.95rem;
    word-break: break-word;
  }
  .task.is-done .task-text {
    color: var(--ink-muted);
    text-decoration: line-through;
    text-decoration-color: var(--ink-muted);
  }

  .task-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: 5px;
    text-transform: uppercase;
  }
  .badge.high { color: var(--high); background: var(--high-soft); }
  .badge.medium { color: var(--medium); background: var(--medium-soft); }
  .badge.low { color: var(--low); background: var(--low-soft); }
  .badge.date { color: var(--ink-muted); background: var(--surface-alt); border: 1px solid var(--rule); }

  .delete-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .delete-btn:hover { background: var(--high-soft); color: var(--high); }
  .delete-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .task.removing {
    opacity: 0;
    transform: translateX(8px) rotate(1deg);
  }

  .empty-state {
    padding: 22px 4px;
    color: var(--ink-muted);
    font-size: 0.88rem;
    font-style: italic;
  }

  /* ---------- completed = ledger stub look ---------- */
  .completed-wrap {
    border-top: 2px dashed var(--rule);
    padding-top: 14px;
    position: relative;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body data-theme="light">
<div class="wrap">

  <header>
    <div class="brand">
      <h1>Ledger</h1>
      <p>a small ritual for getting things done</p>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="num" id="statTotal">0</span>
      <span class="label">Total</span>
    </div>
    <div class="stat pending">
      <span class="num" id="statPending">0</span>
      <span class="label">Pending</span>
    </div>
    <div class="stat done">
      <span class="num" id="statDone">0</span>
      <span class="label">Done</span>
    </div>
  </div>

  <div class="controls">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search tasks…" aria-label="Search tasks">
    </div>
    <form class="add-row" id="addForm">
      <input type="text" class="task-text" id="taskInput" placeholder="Add a task…" aria-label="New task" required>
      <select id="prioritySelect" aria-label="Priority">
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="low">Low</option>
      </select>
      <input type="date" id="dueInput" aria-label="Due date">
      <button type="submit" class="add-btn">+ Add</button>
    </form>
  </div>

  <section>
    <h2 class="section-title">Pending</h2>
    <ul class="task-list" id="pendingList"></ul>
    <div class="empty-state" id="pendingEmpty" style="display:none;">Nothing here yet — add your first task above.</div>
  </section>

  <section class="completed-wrap">
    <h2 class="section-title">Completed</h2>
    <ul class="task-list" id="doneList"></ul>
    <div class="empty-state" id="doneEmpty" style="display:none;">Nothing finished yet.</div>
  </section>

</div>

<script>
  // ---------- state (in-memory only; no localStorage) ----------
  let tasks = [];
  let nextId = 1;
  let searchQuery = "";

  const pendingList = document.getElementById('pendingList');
  const doneList = document.getElementById('doneList');
  const pendingEmpty = document.getElementById('pendingEmpty');
  const doneEmpty = document.getElementById('doneEmpty');
  const statTotal = document.getElementById('statTotal');
  const statPending = document.getElementById('statPending');
  const statDone = document.getElementById('statDone');

  function formatDate(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function matchesSearch(task) {
    if (!searchQuery) return true;
    return task.text.toLowerCase().includes(searchQuery.toLowerCase());
  }

  function checkIcon() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  }

  function trashIcon() {
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';
  }

  function buildTaskEl(task) {
    const li = document.createElement('li');
    li.className = 'task' + (task.done ? ' is-done' : '');
    li.dataset.id = task.id;

    const dateLabel = formatDate(task.due);
    const metaParts = [];
    metaParts.push('<span class="badge ' + task.priority + '">' + task.priority + '</span>');
    if (dateLabel) metaParts.push('<span class="badge date">' + dateLabel + '</span>');

    li.innerHTML =
      '<button class="check" aria-label="Toggle complete">' + checkIcon() + '</button>' +
      '<div class="task-body">' +
        '<div class="task-text"></div>' +
        '<div class="task-meta">' + metaParts.join('') + '</div>' +
      '</div>' +
      '<button class="delete-btn" aria-label="Delete task">' + trashIcon() + '</button>';

    li.querySelector('.task-text').textContent = task.text;
    li.querySelector('.check').addEventListener('click', () => toggleDone(task.id));
    li.querySelector('.delete-btn').addEventListener('click', () => removeTask(task.id, li));

    return li;
  }

  function render() {
    const visible = tasks.filter(matchesSearch);
    const pending = visible.filter(t => !t.done);
    const done = visible.filter(t => t.done);

    pendingList.innerHTML = '';
    pending.forEach(t => pendingList.appendChild(buildTaskEl(t)));
    pendingEmpty.style.display = pending.length ? 'none' : 'block';

    doneList.innerHTML = '';
    done.forEach(t => doneList.appendChild(buildTaskEl(t)));
    doneEmpty.style.display = done.length ? 'none' : 'block';

    statTotal.textContent = tasks.length;
    statPending.textContent = tasks.filter(t => !t.done).length;
    statDone.textContent = tasks.filter(t => t.done).length;
  }

  function addTask(text, priority, due) {
    tasks.unshift({ id: nextId++, text, priority, due, done: false });
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    render();
  }

  function removeTask(id, el) {
    el.classList.add('removing');
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }, 220);
  }

  document.getElementById('addForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const priority = document.getElementById('prioritySelect').value;
    const due = document.getElementById('dueInput').value;
    addTask(text, priority, due);
    input.value = '';
    document.getElementById('dueInput').value = '';
    input.focus();
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    render();
  });

  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeToggle.textContent = isDark ? '🌙' : '☀️';
  });

  // seed a couple of example tasks so the app isn't empty on first view
  addTask('Review assignment brief', 'medium', '');
  addTask('Set up AntiGravity agent roles', 'high', '');
  tasks[0].done = true;
  render();
</script>
</body>
</html>
